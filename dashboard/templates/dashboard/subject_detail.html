{% extends 'dashboard/base.html' %}

{% block content %}
<style>
    .viz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .viz-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }

    .viz-grid-bottom {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        /* 2 centered */
        gap: 20px;
        width: 66%;
        margin: 0 auto;
    }

    .class-container {
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 0;
        overflow: hidden;
        height: 400px;
        /* Fixed height for scroll */
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-soft);
    }

    .class-header {
        padding: 12px 15px;
        background: #f1f5f9;
        border-bottom: 1px solid var(--border-color);
        font-weight: 600;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .class-label {
        font-size: 15px;
        color: var(--text-main);
        font-weight: 700;
    }

    .class-count {
        font-size: 12px;
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 10px;
        border-radius: 99px;
        color: var(--text-muted);
        font-weight: 600;
    }

    .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        background-color: #fafafa;
        /* Subtle grid pattern */
        background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* Scrollbar styling */
    .scroll-area::-webkit-scrollbar {
        width: 6px;
    }

    .scroll-area::-webkit-scrollbar-track {
        background: transparent;
    }

    .scroll-area::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }

    .scroll-area::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }

    .waveform-card {
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 10px;
        height: 100px;
        position: relative;
        width: 100%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>

<div class="viz-header">
    <div>
        <a href="{% url 'visualize' %}" style="color: var(--primary); text-decoration: none; font-size: 14px;">← Back to
            Subjects</a>
        <h2 style="margin: 5px 0 0 0;">Subject {{ subject_id }}</h2>
        <span style="font-size: 13px; color: var(--text-muted);">MIT-BIH Arrhythmia Database</span>
    </div>

    <div style="text-align: right;">
        <span class="btn btn-outline" style="font-size: 13px; cursor: default;">Analysis View</span>
    </div>
</div>

<!-- Top Row: N, S, V -->
<div class="viz-grid">
    <!-- N -->
    <div class="class-container">
        <div class="class-header" style="border-left: 4px solid #22c55e;">
            <span class="class-label">Normal (N)</span>
            <span class="class-count" id="count-N">0</span>
        </div>
        <div class="scroll-area" id="container-N"></div>
    </div>

    <!-- S -->
    <div class="class-container">
        <div class="class-header" style="border-left: 4px solid #f59e0b;">
            <span class="class-label">Supraventricular (S)</span>
            <span class="class-count" id="count-S">0</span>
        </div>
        <div class="scroll-area" id="container-S"></div>
    </div>

    <!-- V -->
    <div class="class-container">
        <div class="class-header" style="border-left: 4px solid #ef4444;">
            <span class="class-label">Ventricular (V)</span>
            <span class="class-count" id="count-V">0</span>
        </div>
        <div class="scroll-area" id="container-V"></div>
    </div>
</div>

<!-- Bottom Row: F, Q -->
<div class="viz-grid-bottom">
    <!-- F -->
    <div class="class-container">
        <div class="class-header" style="border-left: 4px solid #8b5cf6;">
            <span class="class-label">Fusion (F)</span>
            <span class="class-count" id="count-F">0</span>
        </div>
        <div class="scroll-area" id="container-F"></div>
    </div>

    <!-- Q -->
    <div class="class-container">
        <div class="class-header" style="border-left: 4px solid #94a3b8;">
            <span class="class-label">Unknown (Q)</span>
            <span class="class-count" id="count-Q">0</span>
        </div>
        <div class="scroll-area" id="container-Q"></div>
    </div>
</div>

<!-- Data Passing -->
{{ beat_data|json_script:"beat-data" }}

<script>
    const beatData = JSON.parse(document.getElementById('beat-data').textContent);

    const classes = ['N', 'S', 'V', 'F', 'Q'];
    const colors = {
        'N': '#15803d', // Green 700
        'S': '#d97706', // Amber 600
        'V': '#b91c1c', // Red 700
        'F': '#7c3aed', // Violet 600
        'Q': '#475569'  // Slate 600
    };

    classes.forEach(cls => {
        const container = document.getElementById(`container-${cls}`);
        const countSpan = document.getElementById(`count-${cls}`);
        const data = beatData[cls] || [];

        countSpan.textContent = data.length;

        if (data.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 20px; color: #64748b; font-size: 13px;">No beats found</div>';
            return;
        }

        data.forEach((waveform, index) => {
            const card = document.createElement('div');
            card.className = 'waveform-card';

            const canvas = document.createElement('canvas');
            // Give canvas unique ID
            canvas.id = `chart-${cls}-${index}`;
            card.appendChild(canvas);

            container.appendChild(card);

            // Draw Waveform using simple Canvas API for performance (Chart.js is heavier)
            // Wait for Append to get size
            setTimeout(() => drawWaveform(canvas, waveform, colors[cls]), 0);
        });
    });

    function drawWaveform(canvas, data, color) {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;

        ctx.scale(dpr, dpr);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = color;
        ctx.lineJoin = 'round';

        // Draw centered line
        const width = rect.width;
        const height = rect.height;
        const step = width / (data.length - 1);

        // Normalize data to fit height (auto-scale)
        const minVal = Math.min(...data);
        const maxVal = Math.max(...data);
        const range = maxVal - minVal || 1;

        // Padding
        const padding = 10;
        const drawHeight = height - (padding * 2);

        ctx.beginPath();
        data.forEach((val, i) => {
            const x = i * step;
            // Invert Y (canvas origin top-left), scale to fit
            const normalized = (val - minVal) / range;
            const y = height - padding - (normalized * drawHeight);

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // Resize observer to redraw? Ideally yes, but for now fixed height cards are okay.
</script>

{% endblock %}
