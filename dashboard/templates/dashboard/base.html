<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart ECG Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts for Medical/Modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* High-End Medical Theme */
            --bg-body: #f8fafc;
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #e0f2fe;
            /* Pale blue */

            --primary: #0ea5e9;
            /* Sky 500 - Medical Blue */
            --primary-dark: #0284c7;
            /* Sky 600 */
            --accent-teal: #14b8a6;
            /* Teal 500 */
            --accent-cyan: #06b6d4;
            /* Cyan 500 */

            --text-main: #1e293b;
            /* Slate 800 - Crisp Dark */
            --text-muted: #64748b;
            /* Slate 500 */

            --border-light: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Subtle ECG Pattern Background */
            background-image:
                linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%),
                url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjUwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXRoIGQ9Ik0wIDI1IGgxMCBsNSAtMTAgbDUgMjAgbDUgLTEwIGg1MCIgc3Ryb2tlPSJyd2JhKDAsIDE1MCwgMjAwLCAwLjA1KSIgZmlsbD0ibm9uZSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+');
            background-repeat: repeat;
        }

        header {
            padding: 16px 48px;
            background: rgba(255, 255, 255, 0.85);
            /* Glassy White */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent-teal));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        header h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        header h1 span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            position: relative;
            transition: color 0.2s;
            padding: 5px 0;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-dark);
        }

        /* Active Indicator (Underline glow) */
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--primary);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .container {
            flex: 1;
            padding: 40px;
            max-width: 1280px;
            margin: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        footer {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            background: white;
            border-top: 1px solid var(--border-light);
        }

        /* Utilities */
        .text-center {
            text-align: center;
        }

        .mb-4 {
            margin-bottom: 1.5rem;
        }

        .mt-4 {
            margin-top: 1.5rem;
        }

        /* Buttons - Medical Pill Style */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            border-radius: 9999px;
            /* Pill shape */
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
            letter-spacing: 0.01em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(14, 165, 233, 0.35);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            background: white;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
            transform: translateY(-1px);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">⚡</div>
            <h1>Smart<span>ECG</span></h1>
        </div>
        <nav class="nav-links">
            <a href="{% url 'home' %}" class="nav-link">Home</a>
            <a href="{% url 'upload' %}" class="nav-link">Analysis</a>
            <a href="{% url 'visualize' %}" class="nav-link">Visualization (MIT-BIH)</a>
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="nav-link" style="background:none; border:none; padding:5px 0; cursor:pointer; font-family:inherit; font-size:15px; font-weight:500;">Logout</button>
            </form>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        © 2026 Smart ECG IoMT Healthcare System | Department of Biomedical Engineering
    </footer>

    {% block extra_js %}{% endblock %}

</body>

</html>
